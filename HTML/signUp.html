<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="../CSS/logIn.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
    rel="stylesheet" />
  <script src="../JS/components.js" defer></script>
</head>

<body>
  <form action="" class="signupForm">
    <div class="form-logo">
      <img src="../Assets/Icons/blue-heart.svg" alt="Logo Image">
      <p>SmartCare</p>
    </div>

    <div class="greetings">
      <h4>Create Account</h4>
      <p>Join SmartCare Today</p>
    </div>

    <div class="form-div">
      <label class="label-element" for="fullName">Full Name</label>
      <input class="input-element" id="fullName" type="text" placeholder="Piyush Shah" required>
    </div>
    <div class="form-div">
      <label class="label-element" for="email">Email Address</label>
      <input class="input-element" id="email" type="text" placeholder="abc@email.com" required>
    </div>
    <div class="form-div">
      <label class="label-element" for="number">Phone Number</label>
      <input class="input-element" id="number" type="text" placeholder="+91-******2029" required>
    </div>
    <div class="form-div">
      <label class="label-element" for="password">Password</label>
      <input class="input-element" id="password" type="text" placeholder="Create a strong password" required>
    </div>
    <div class="form-div">
      <label class="label-element" for="confirmPassword">Confirm Password</label>
      <input class="input-element" id="confirmPassword" type="text" placeholder="Confirm your password" required>
    </div>
    <div class="form-div rememberForgot">
      <div style="width: 90%;">
        <input id="rememberMe" type="checkbox">
        <label class="label-element" for="rememberMe">I agree to the <a href="">Terms Of Service</a> and <a href="">Privacy Policy</a></label>
      </div>
    </div>
    <button class="login-btn">Sign Up</button>
    <p>Already have an account? <a class="switch-form" href="../HTML/logIn.html">Log In</a></p>
  </form>
</body>

</html>
