<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="../CSS/logIn.css">
  <script src="../JS/components.js" defer></script>
</head>

<body>
  <app-header></app-header>
  <div class="auth-header-text">
    <h4>Create Account</h4>
    <p>Join us and take control of your health journey</p>
  </div>

  <form action="" class="signupForm">
    <div>
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" placeholder="Piyush Shah" required>
    </div>
    <div>
      <label for="email">Email Address</label>
      <input id="email" type="text" placeholder="abc@email.com" required>
    </div>
    <div>
      <label for="number">Phone Number</label>
      <input id="number" type="text" placeholder="+91-******2029" required>
    </div>
    <div>
      <label for="password">Password</label>
      <input id="password" type="text" placeholder="Create a strong password" required>
    </div>
    <div>
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="text" placeholder="Confirm your password" required>
    </div>
    <div class="rememberForgot">
      <div style="width: 90%;">
        <input id="rememberMe" type="checkbox">
        <label for="rememberMe">I agree to the <a href="">Terms Of Service</a> and <a href="">Privacy Policy</a></label>
      </div>
    </div>
    <button>Sign Up</button>
    <p>Already have an account? <a href="../HTML/logIn.html">Log In</a></p>
  </form>
  <app-footer></app-footer>
</body>

</html>
