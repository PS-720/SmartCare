<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Log In</title>
	<link rel="stylesheet" href="../CSS/style.css">
	<link rel="stylesheet" href="../CSS/logIn.css">
	<script src="../JS/components.js" defer></script>
</head>

<body>
	<app-header></app-header>
	<div class="auth-header-text">
		<h4>Welcome Back</h4>
		<p>Log In to manage your appointments and health</p>
	</div>

	<form action="" class="signupForm">
		<div>
			<label for="email">Email Address</label>
			<input id="email" type="text" placeholder="your@email.com" required>
		</div>
		<div>
			<label for="password">Password</label>
			<input id="password" type="text" placeholder="Enter your password" required>
		</div>
		<div class="rememberForgot">
			<div>
				<input id="rememberMe" type="checkbox">
				<label for="rememberMe">Remember Me</label>
			</div>
			<a href="">Forgot Password?</a>
		</div>
		<button>Log In</button>
		<p>Don't have an account? <a href="../HTML/signUp.html">Sign Up</a></p>
	</form>

	<a style="padding: 20px; position: absolute; top: 300px; left: 100px; text-decoration: none; background-color: rgb(36, 184, 6); border-radius: 15px; color: white; font-size: 1rem;" href="../HTML/patient.html">Patient Section</a>

	<app-footer></app-footer>
</body>

</html>
