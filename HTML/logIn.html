<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up</title>
	<link rel="stylesheet" href="../CSS/logIn.css">
</head>

<body>
	<div class="navigation-bar-logo">
		<a class="HealthCare" href="../HTML/index.html">
			<img class="icons" src="../RESOURCES/Images/logo.png" alt="logo-image" />
			<h3>HealthCare</h3>
		</a>
		<h4>Welcome Back</h4>
		<p>Log In to manage your appointments and health</p>
	</div>

	<form action="" class="signupForm">
		<div>
			<label for="email">Email Address</label>
			<input id="email" type="text" placeholder="your@email.com" required>
		</div>
		<div>
			<label for="password">Password</label>
			<input id="password" type="text" placeholder="Enter your password" required>
		</div>
		<div class="rememberForgot">
			<div>
				<input id="rememberMe" type="checkbox">
				<label for="rememberMe">Remember Me</label>
			</div>
			<a href="">Forgot Password?</a>
		</div>
		<button>Log In</button>
		<p>Don't have an account? <a href="../HTML/signUp.html">Sign Up</a></p>
	</form>
</body>

</html>
