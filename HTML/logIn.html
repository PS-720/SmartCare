<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="stylesheet" href="../CSS/logIn.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <script src="../JS/components.js" defer></script>
    <script src="../JS/auth.js" defer></script>
  </head>

  <body>
    <form action="" class="signupForm">
      <div class="form-logo">
        <img src="../Assets/Icons/blue-heart.svg" alt="Logo Image" />
        <p>SmartCare</p>
      </div>

      <div class="greetings">
        <h4>Welcome Back</h4>
        <p>Log In to manage your appointments and health</p>
      </div>

      <div class="form-div">
        <label class="label-element" for="email">Email Address</label>
        <input
          class="input-element"
          id="email"
          type="text"
          placeholder="your@email.com"
          required
        />
      </div>

      <div class="form-div">
        <label class="label-element" for="password">Password</label>
        <input
          class="input-element"
          id="password"
          type="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <div class="rememberForgot form-div">
        <div>
          <input id="rememberMe" type="checkbox" />
          <label class="label-element" for="rememberMe">Remember Me</label>
        </div>
        <a href="">Forgot Password?</a>
      </div>

      <button class="login-btn">Log In</button>

      <p>
        Don't have an account?
        <a class="switch-form" href="../HTML/signUp.html">Sign Up</a>
      </p>
    </form>
  </body>
</html>
